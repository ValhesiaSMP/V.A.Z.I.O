<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V.A.Z.I.O | Arquivo Investigativo Classificado</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111111;
color:#cfd7ff;
font-family:'JetBrains Mono', monospace;
overflow-x:hidden;
}

header{
border-bottom:2px solid #2e3f8f;
padding:25px;
background:linear-gradient(180deg,#0f1425 0%,#0b0f1a 100%);
position:sticky;
top:0;
}

h1{
color:#d6d6d6;
letter-spacing:3px;
}

main{
max-width:900px;
margin:auto;
padding:30px;
}

.panel{
border:1px solid #2a2a2a;
padding:25px;
margin-bottom:25px;
background:rgba(15,20,37,0.8);
}

input{
width:100%;
padding:12px;
background:#0c1124;
color:#66b3ff;
border:1px solid #2e3f8f;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 18px;
background:#1b2b6b;
border:1px solid #66b3ff;
color:#66b3ff;
cursor:pointer;
}

.hidden{
display:none;
color:#ff5555;
margin-top:10px;
}

.revealed{
display:block;
}

.secret{
display:none;
margin-top:20px;
border:1px solid #66b3ff;
padding:15px;
}

audio{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<h1>▲ V.A.Z.I.O ▼</h1>
</header>

<main>

<div class="panel">
<h2>BEM-VINDO</h2>
<p>Você encontrou algo que não deveria.</p>
</div>

<div class="panel">

<h2>ACESSO RESTRITO</h2>

<p>Digite a chave:</p>

<input id="senha" placeholder="...">

<button onclick="verificar()">VALIDAR</button>

<div id="erro" class="hidden">ACESSO NEGADO</div>

<div id="nivel2" class="secret">

<p>Chave aceita.</p>

<p>Nem tudo está visível.</p>

<audio controls>
<source src="SEU_AUDIO_AQUI.wav" type="audio/wav">
</audio>

<p>Escute com atenção.</p>

<input id="senha2" placeholder="segunda chave...">

<button onclick="verificar2()">DESBLOQUEAR</button>

<div id="erro2" class="hidden">INCORRETO</div>

</div>

<div id="final" class="secret">

<h2>ACESSO CONCEDIDO</h2>

<p>Eles sabem que você está aqui.</p>

<p>/echo.html</p>

</div>

</div>

</main>

<script>

// PRIMEIRA SENHA (VAZIO)
function verificar(){

let s = document.getElementById("senha").value.toUpperCase()

if(s === "VAZIO"){
document.getElementById("nivel2").style.display="block"
document.getElementById("erro").classList.remove("revealed")
}else{
document.getElementById("erro").classList.add("revealed")
}

}

// SEGUNDA SENHA (MUDA SE QUISER)
function verificar2(){

let s = document.getElementById("senha2").value.toUpperCase()

if(s === "ECHO"){
document.getElementById("final").style.display="block"
document.getElementById("erro2").classList.remove("revealed")
}else{
document.getElementById("erro2").classList.add("revealed")
}

}

</script>

</body>
</html>
