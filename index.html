<!-- 13-1-26-9-15 -->
<!-- talvez não seja só números... talvez seja ordem -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V.A.Z.I.O | Sistema Classificado</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0a0a0a;
color:#cfd7ff;
font-family:'JetBrains Mono', monospace;
}

.glitch{
animation: glitch 1s infinite;
}

@keyframes glitch{
0%{opacity:1;}
50%{opacity:0.6;}
100%{opacity:1;}
}

header{
border-bottom:1px solid #1f2a5a;
padding:20px;
}

main{
max-width:900px;
margin:auto;
padding:30px;
}

.panel{
border:1px solid #1f2a5a;
padding:20px;
margin-bottom:20px;
background:#0f1425;
}

.hidden{
display:none;
color:#ff5e5e;
margin-top:15px;
}

.revealed{
display:block;
}

input{
width:100%;
padding:10px;
background:#000;
border:1px solid #2e3f8f;
color:#66b3ff;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
background:#1b2b6b;
border:1px solid #66b3ff;
color:#66b3ff;
cursor:pointer;
}

.secret{
display:none;
margin-top:20px;
border:1px solid #ff5e5e;
padding:15px;
}

audio{
margin-top:10px;
width:100%;
}
</style>
</head>

<body>

<header>
<h1 class="glitch">▲ V.A.Z.I.O ▼</h1>
</header>

<main>

<div class="panel">
<h2>SISTEMA</h2>
<p>Você não deveria estar aqui.</p>
</div>

<div class="panel">
<h2>ACESSO RESTRITO</h2>

<p>Insira a chave:</p>
<input id="senha" placeholder="...">

<button onclick="verificar()">VALIDAR</button>

<div id="erro" class="hidden">ACESSO NEGADO</div>

<div id="nivel2" class="secret">

<p>Chave aceita.</p>
<p>Mas você ainda não terminou.</p>

<audio controls>
<source src="SEU_AUDIO_AQUI.wav" type="audio/wav">
</audio>

<p>Dica: nem tudo se vê... alguns apenas escutam.</p>

<input id="senha2" placeholder="segunda chave...">
<button onclick="verificar2()">DESBLOQUEAR</button>

<div id="erro2" class="hidden">INCORRETO</div>

</div>

<div id="final" class="secret">
<h2>ACESSO CONCEDIDO</h2>

<p>
Eles observaram você.
</p>

<p>
/echo.html
</p>

</div>

</div>

</main>

<script>

// PRIMEIRA SENHA (13-1-26-9-15 → MAZIO)
function verificar(){

let s = document.getElementById("senha").value.toUpperCase()

if(s === "MAZIO"){
document.getElementById("nivel2").style.display="block"
document.getElementById("erro").classList.remove("revealed")
}else{
document.getElementById("erro").classList.add("revealed")
}

}

// SEGUNDA SENHA (ÁUDIO MORSE)
function verificar2(){

let s = document.getElementById("senha2").value.toUpperCase()

if(s === "ECHO"){ // MUDA AQUI SE QUISER
document.getElementById("final").style.display="block"
document.getElementById("erro2").classList.remove("revealed")
}else{
document.getElementById("erro2").classList.add("revealed")
}

}

</script>

</body>
</html>
